<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>规则管理 - Demo</title>
  <link rel="stylesheet" href="./app.css">
</head>
<body>
  <div class="shell">
    <aside class="sidebar">
      <div class="brand">
        <span class="brand-dot"></span>
        <div>
          <h1>Packing Studio</h1>
          <p>多页面 Demo</p>
        </div>
      </div>
      <nav class="nav">
        <a href="./list.html">列表页</a>
        <a href="./detail.html">详情页</a>
        <a class="active" href="./rules.html">规则页</a>
        <a href="./overview.html">汇总页</a>`r`n      </nav>
      <div class="sidebar-foot">规则示例可筛选可切换</div>
    </aside>

    <main class="main">
      <section class="card top">
        <div>
          <h2>规则管理（Demo）</h2>
          <p id="datasetName">-</p>
        </div>
        <div class="toolbar" id="datasetSwitch"></div>
      </section>

      <section class="card">
        <div class="row" style="margin-bottom:10px;">
          <select id="moduleFilter">
            <option value="customerRules">客户规则</option>
            <option value="modelInner">型号-内盒</option>
            <option value="innerOuter">内盒-外箱</option>
          </select>
          <input id="keywordInput" placeholder="输入关键字筛选" />
          <button id="resetFilters" class="ghost">重置筛选</button>
          <button id="fakeAddBtn">新增规则</button>
          <button id="fakeImportBtn">导入规则</button>
        </div>
        <div class="kpis" id="ruleKpis"></div>
      </section>

      <section class="card">
        <table>
          <thead>
            <tr id="ruleHead"></tr>
          </thead>
          <tbody id="ruleBody"></tbody>
        </table>
        <div id="ruleEmpty" class="empty" style="display:none; margin-top:12px;">没有匹配数据</div>
      </section>
    </main>
  </div>

  <div class="toast" id="toast">Demo 交互：仅前端假数据</div>
  <script src="./shared-data.js"></script>
  <script src="./rules.js"></script>
</body>
</html>
