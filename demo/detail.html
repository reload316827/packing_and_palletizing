<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>任务详情 - Demo</title>
  <link rel="stylesheet" href="./app.css">
</head>
<body>
  <div class="shell">
    <aside class="sidebar">
      <div class="brand">
        <span class="brand-dot"></span>
        <div>
          <h1>Packing Studio</h1>
          <p>多页面 Demo</p>
        </div>
      </div>
      <nav class="nav">
        <a href="./list.html">列表页</a>
        <a class="active" href="./detail.html">详情页</a>
        <a href="./rules.html">规则页</a>
        <a href="./overview.html">汇总页</a>
      </nav>
      <div class="sidebar-foot">支持 3D 视图切换与筛选</div>
    </aside>

    <main class="main">
      <section class="card top">
        <div>
          <h2 id="detailTitle">任务详情</h2>
          <p id="detailSub">-</p>
        </div>
        <div class="toolbar">
          <div id="datasetSwitch"></div>
          <a href="./list.html"><button class="ghost">返回列表</button></a>
        </div>
      </section>

      <section class="card" id="missingDataCard" style="display:none;">
        <div class="plan-table-head">
          <h4>缺少数据补录</h4>
          <p id="missingDataMeta">-</p>
        </div>
        <div id="missingDataEmpty" class="empty" style="display:none; margin-top:10px;">当前计划没有缺少数据</div>
        <div id="missingDataTableWrap" class="plan-table-scroll" style="display:none;">
          <table>
            <thead>
              <tr>
                <th>型号</th>
                <th>缺失行数</th>
                <th>缺失数量</th>
                <th>内盒编号</th>
                <th>毛重(kg)</th>
                <th>备注</th>
              </tr>
            </thead>
            <tbody id="missingDataBody"></tbody>
          </table>
        </div>
        <div class="row" style="margin-top:10px; justify-content:flex-end;">
          <button id="saveMissingDataBtn" class="primary">保存并重新计算</button>
        </div>
      </section>

      <section class="card">
        <h3 style="margin-top:0;">方案明细（装箱 + 装托）</h3>
        <div id="planTableWrap" class="plan-table-wrap"></div>
      </section>

      <section class="card">
        <div class="row" style="margin-bottom:10px;">
          <select id="planSelect"></select>
          <select id="modelFilter"></select>
          <select id="specFilter"></select>
          <select id="cartonFilter"></select>
          <button id="reset3dFilters" class="ghost">重置 3D 筛选</button>
          <button id="viewPackingBtn">装箱视图</button>
          <button id="viewPalletBtn" class="primary">装托视图</button>
          <div id="viewerPager" class="viewer-page-controls" style="display:none;">
            <button id="viewerPrevBtn" class="ghost" type="button">上一页</button>
            <span id="viewerPageInfo">第 1 / 1 页</span>
            <button id="viewerNextBtn" class="ghost" type="button">下一页</button>
          </div>
        </div>
        <div class="kpis" id="detailKpis"></div>
      </section>

      <section class="card">
        <div class="viewer-wrap">
          <div id="viewer" class="viewer"></div>
          <aside class="legend">
            <h4>操作说明</h4>
            <ul>
              <li>左键拖动：旋转视角</li>
              <li>滚轮：缩放</li>
              <li>右键拖动：平移</li>
              <li>双击空白：重置视角</li>
            </ul>
            <h4>当前场景</h4>
            <p id="sceneMeta">-</p>
            <h4 style="margin-top:10px;">箱号信息</h4>
            <p id="cartonInfo">请选择箱号查看明细</p>
            <h4 style="margin-top:10px;">假数据说明</h4>
            <p>装箱展示外箱与内盒型号；装托突出竖放外箱（橙色/红色标签）。</p>
            <div class="viewer-filters">
              <label for="packingBoxSelect">装箱筛选（单箱）</label>
              <select id="packingBoxSelect"></select>
              <label for="palletSelect">装托筛选（单托）</label>
              <select id="palletSelect"></select>
              <label for="labelScaleSelect">型号标签放大倍数</label>
              <select id="labelScaleSelect">
                <option value="1">1x</option>
                <option value="1.5">1.5x</option>
                <option value="2" selected>2x</option>
                <option value="3">3x</option>
              </select>
              <label for="labelModeSelect">标签模式</label>
              <select id="labelModeSelect">
                <option value="sparse" selected>稀疏</option>
                <option value="all">全部</option>
                <option value="top">仅顶层</option>
              </select>
            </div>
          </aside>
        </div>
      </section>

      <section class="grid-2">
        <article class="card">
          <h3 style="margin-top:0;">方案对比</h3>
          <div id="solutionGrid" class="grid-3"></div>
        </article>
        <article class="card">
          <h3 style="margin-top:0;">订单组合</h3>
          <p id="ordersText"></p>
          <div class="row" id="metricScopeSwitch" style="justify-content:flex-end; margin:8px 0;"></div>
          <table>
            <thead>
              <tr>
                <th>指标</th>
                <th>数值</th>
              </tr>
            </thead>
            <tbody id="metricsTable"></tbody>
          </table>
        </article>
      </section>
    </main>
  </div>

  <div class="toast" id="toast">Demo 交互：仅前端假数据</div>
  <script src="./shared-data.js"></script>
  <script src="./vendor/three.min.js"></script>
  <script src="./vendor/OrbitControls.js"></script>
  <script src="./detail.js"></script>
</body>
</html>
